<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>2FA System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <style>
        .container {
            max-width: 600px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>2FA System</h2>
    <div id="alertBox"></div>

    <ul class="nav nav-tabs">
        <li class="nav-item"><a class="nav-link active" data-toggle="tab" href="#login">Login</a></li>
        <li class="nav-item"><a class="nav-link" data-toggle="tab" href="#register">Register</a></li>
    </ul>

    <div class="tab-content">
        <!-- Login -->
        <div id="login" class="tab-pane fade show active">
            <form id="loginForm">
                <div class="form-group mt-3">
                    <label>Email:</label>
                    <input type="email" class="form-control" id="loginEmail" required />
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" class="form-control" id="loginPassword" required />
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>

        <!-- Register -->
        <div id="register" class="tab-pane fade">
            <form id="registerForm">
                <div class="form-group mt-3">
                    <label>Email:</label>
                    <input type="email" class="form-control" id="registerEmail" required />
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" class="form-control" id="registerPassword" required />
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
        </div>
    </div>

    <!-- Modal 2FA -->
    <div class="modal fade" id="twoFactorModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Enable 2FA</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <label><input type="radio" name="fa_method" value="totp" checked /> TOTP (Google Authenticator)</label><br />
                    <label><input type="radio" name="fa_method" value="hardware" /> Hardware Token</label><br /><br />

                    <div id="totp_section">
                        <button class="btn btn-secondary" id="setupTOTPBtn">Setup TOTP (Google Authenticator)</button>
                        <div id="qrcode" class="mb-3 mt-3"></div>
                        <input type="text" class="form-control" id="totpCode" placeholder="Enter TOTP code" />
                    </div>

                    <div id="hardware_section" style="display:none;">
                        <input type="text" class="form-control" id="hardwareCode" placeholder="Enter Hardware token code" />
                        <button class="btn btn-info mt-2" id="registerHardwareBtn">Register Hardware Token</button>
                    </div>

                    <button class="btn btn-primary mt-2" id="verify2FABtn">Verify 2FA</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentEmail = '';

    function showAlert(message, type = 'success') {
        $('#alertBox').html(`
            <div class="alert alert-${type} alert-dismissible fade show mt-3" role="alert">
                ${message}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        `);
    }

    // Ndryshimi i shfaqjes bazuar në metodën e zgjedhur
    $('input[name="fa_method"]').change(function () {
        if ($(this).val() === 'totp') {
            $('#totp_section').show();
            $('#hardware_section').hide();
        } else {
            $('#totp_section').hide();
            $('#hardware_section').show();
        }
    });

    $("#loginForm").submit(function (e) {
        e.preventDefault();
        const email = $("#loginEmail").val();
        const password = $("#loginPassword").val();
        currentEmail = email;

        $.post("/login", { email, password }, function (res) {
            if (res.message === "Login successful") {
                $('#twoFactorModal').modal('show');

                // Automatikisht kliko Setup TOTP për të krijuar QR
                setTimeout(() => {
                    if ($('input[name="fa_method"]:checked').val() === 'totp') {
                        $("#setupTOTPBtn").click();
                    }
                }, 500);
            } else {
                showAlert(res.message, "danger");
            }
        }).fail(function (xhr) {
            showAlert(xhr.responseJSON?.message || "Login failed", "danger");
        });
    });

    $("#registerForm").submit(function (e) {
        e.preventDefault();
        const email = $("#registerEmail").val();
        const password = $("#registerPassword").val();

        $.post("/register", { email, password }, function (res) {
            if (res.message === "Registration successful") {
                showAlert("Registration successful", "success");
                currentEmail = email;

            } else {
                showAlert(res.message, "danger");
            }
        }).fail(function (xhr) {
            showAlert(xhr.responseJSON?.message || "Registration failed", "danger");
        });
    });

    // Gjenerimi i QR për TOTP
    $("#setupTOTPBtn").click(function () {
        $.post("/setup_totp", { email: currentEmail }, function (res) {
            $('#qrcode').empty();
            new QRCode(document.getElementById("qrcode"), res.qr_url);
        });
    });

    // Verifikimi 2FA
    $("#verify2FABtn").click(function () {
        const method = $('input[name="fa_method"]:checked').val();
        let code = '';
        if (method === 'totp') {
            code = $("#totpCode").val();
        } else {
            code = $("#hardwareCode").val();
        }

        $.post("/verify_2fa", { email: currentEmail, code, method }, function (res) {
            if (res.message === "2FA verified successfully") {
                showAlert("Login successful", "success");
                $('#twoFactorModal').modal('hide');
                setTimeout(() => {
                    window.location.href = "/dashboard";
                }, 1000);
            } else {
                showAlert(res.message, "danger");
            }
        }).fail(function (xhr) {
            showAlert(xhr.responseJSON?.message || "Verification failed", "danger");
        });
    });

    // Regjistrimi i Hardware Token
    $("#registerHardwareBtn").click(function () {
        const hardwareToken = $("#hardwareCode").val();
        if (!hardwareToken) {
            showAlert("Enter hardware token code", "warning");
            return;
        }

        $.post("/register_hardware_token", { email: currentEmail, hardware_token: hardwareToken }, function (res) {
            showAlert(res.message, "success");
        }).fail(function (xhr) {
            showAlert(xhr.responseJSON?.message || "Hardware token registration failed", "danger");
        });
    });
</script>
</body>
</html>
